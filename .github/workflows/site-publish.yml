name: Site Publish

on:
  push:
    branches: [main]
    paths:
      - "apps/site/**"
      - ".github/workflows/site-publish.yml"
  workflow_dispatch:

# Required for deploying to GitHub Pages via the official actions.
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent Pages deployment; let in-progress ones finish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history so Starlight's `lastUpdated` git dates are accurate.
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v2

      - run: bun install --frozen-lockfile

      - name: Build site
        run: bun run --filter "@buntime/site" build

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: apps/site/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
