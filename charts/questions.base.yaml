# Buntime Helm Chart - Base Questions (Runtime Core)
# This file contains only the runtime core configuration.
# Plugin questions are generated automatically from manifest.yaml files.
#
# DO NOT EDIT questions.yml directly - it is auto-generated.
# Run: bun scripts/generate-helm-questions.ts

questions:
  # ==================== RUNTIME ====================
  - variable: buntime.logLevel
    label: "Log Level"
    description: "Application log verbosity"
    type: enum
    default: "info"
    options:
      - "debug"
      - "info"
      - "warn"
      - "error"
    group: "Runtime"

  - variable: buntime.poolSize
    label: "Worker Pool Size"
    description: "Maximum number of concurrent workers"
    type: int
    default: 100
    min: 1
    max: 1000
    group: "Runtime"

  - variable: buntime.ephemeralConcurrency
    label: "Ephemeral Worker Concurrency"
    description: "Maximum concurrent ttl=0 worker requests before queueing"
    type: int
    default: 2
    min: 1
    max: 100
    group: "Runtime"

  - variable: buntime.ephemeralQueueLimit
    label: "Ephemeral Worker Queue Limit"
    description: "Maximum queued ttl=0 requests before returning 503"
    type: int
    default: 100
    min: 0
    max: 10000
    group: "Runtime"

  - variable: buntime.workerConfigCacheTtlMs
    label: "Worker Config Cache TTL"
    description: "Positive worker manifest/config cache TTL in milliseconds; use 0 to disable"
    type: int
    default: 1000
    min: 0
    max: 60000
    group: "Runtime"

  - variable: buntime.workerResolverCacheTtlMs
    label: "Worker Resolver Cache TTL"
    description: "Positive worker directory lookup cache TTL in milliseconds; use 0 to disable"
    type: int
    default: 1000
    min: 0
    max: 60000
    group: "Runtime"

  - variable: replicaCount
    label: "Replica Count"
    description: "Number of Buntime pod replicas"
    type: int
    default: 1
    min: 1
    max: 10
    group: "Runtime"

  # ==================== SCALING ====================
  - variable: autoscaling.enabled
    label: "Enable Autoscaling"
    description: "Enable Horizontal Pod Autoscaler"
    type: boolean
    default: false
    group: "Scaling"

  - variable: autoscaling.minReplicas
    label: "Minimum Replicas"
    description: "Minimum replicas when autoscaling is enabled"
    type: int
    default: 1
    min: 1
    max: 20
    group: "Scaling"

  - variable: autoscaling.maxReplicas
    label: "Maximum Replicas"
    description: "Maximum replicas when autoscaling is enabled"
    type: int
    default: 5
    min: 1
    max: 100
    group: "Scaling"

  - variable: autoscaling.targetCPUUtilizationPercentage
    label: "Target CPU Utilization"
    description: "Average CPU utilization percentage used by the HPA"
    type: int
    default: 70
    min: 1
    max: 100
    group: "Scaling"

  - variable: autoscaling.targetMemoryUtilizationPercentage
    label: "Target Memory Utilization"
    description: "Average memory utilization percentage used by the HPA"
    type: int
    default: 80
    min: 1
    max: 100
    group: "Scaling"

  - variable: podDisruptionBudget.enabled
    label: "Enable PodDisruptionBudget"
    description: "Keep at least one pod available during voluntary disruptions"
    type: boolean
    default: false
    group: "Scaling"

  - variable: podDisruptionBudget.minAvailable
    label: "PDB Minimum Available"
    description: "Minimum available pods for voluntary disruptions"
    type: int
    default: 1
    min: 1
    max: 20
    group: "Scaling"

  - variable: service.type
    label: "Service Type"
    description: "Kubernetes service type"
    type: enum
    default: "NodePort"
    options:
      - "ClusterIP"
      - "NodePort"
      - "LoadBalancer"
    group: "Runtime"

  - variable: buntime.apiPrefix
    label: "API Prefix"
    description: "Prefix for runtime API routes (e.g., '/_' mounts API at '/_/api')"
    type: string
    default: "/_"
    group: "Runtime"

  - variable: buntime.pluginDirs
    label: "Plugin Directories"
    description: "Colon-separated list of plugin directories"
    type: string
    default: "/data/.plugins:/data/plugins"
    group: "Runtime"

  - variable: buntime.rootKey
    label: "Root Deploy Key"
    description: "High-privilege key for automation (worker and plugin uploads, bootstrap). Stored as a Kubernetes Secret and exposed as RUNTIME_ROOT_KEY."
    type: password
    default: ""
    group: "Runtime"

  - variable: buntime.workerDirs
    label: "Worker Directories"
    description: "Colon-separated list of worker directories"
    type: string
    default: "/data/.apps:/data/apps"
    group: "Runtime"

  # ==================== AUTH DB (API KEY STORE) ====================
  - variable: buntime.authDb.mode
    label: "ApiKeyStore mode"
    description: "local = standalone Turso DB file (single-pod). sync = embedded replica synced with a Turso server primary (multi-pod). Required when replicaCount > 1."
    type: enum
    options:
      - local
      - sync
    default: local
    group: "Runtime"

  - variable: buntime.authDb.syncUrl
    label: "Turso primary URL"
    description: "libsql:// URL of the Turso server primary. Only used when authDb.mode=sync and tursoServer.enabled=false. Auto-populated when tursoServer.enabled=true."
    type: string
    default: ""
    show_if: "buntime.authDb.mode=sync&&tursoServer.enabled=false"
    group: "Runtime"

  - variable: buntime.authDb.syncAuthToken
    label: "Turso primary auth token"
    description: "Auth token for the external Turso server primary. Stored as a Kubernetes Secret."
    type: password
    default: ""
    show_if: "buntime.authDb.mode=sync&&tursoServer.enabled=false"
    group: "Runtime"

  # ==================== TURSO SERVER (in-cluster, multi-tenant) ====================
  - variable: tursoServer.enabled
    label: "Self-hosted multi-tenant Turso server"
    description: "Provision a single-replica StatefulSet running our `turso-server` wrapper. It supervises one `tursodb` process per namespace and exposes a sqld-compatible REST API for create/delete/list. Required for multi-pod or for apps that need dedicated, dynamically-provisioned databases."
    type: boolean
    default: false
    group: "Turso Server"

  - variable: tursoServer.authToken
    label: "Turso data-port auth token"
    description: "Bearer token validated by the turso-server data port. Distributed to every client (workers, plugins, ApiKeyStore). Stored as a Kubernetes Secret."
    type: password
    default: ""
    show_if: "tursoServer.enabled=true"
    group: "Turso Server"

  - variable: tursoServer.adminToken
    label: "Turso admin-port auth token"
    description: "Bearer token validated by the turso-server admin port (namespace lifecycle). Used only by the runtime control plane and cpanel — never distributed to user-app workers. Stored as a Kubernetes Secret."
    type: password
    default: ""
    show_if: "tursoServer.enabled=true"
    group: "Turso Server"

  - variable: tursoServer.autoProvision
    label: "Auto-create namespaces on first connect"
    description: "When true, a connect() to an unknown namespace spawns it transparently. When false, only explicit POST /v1/namespaces/<name>/create works. Enable for lowcode-style use cases where apps create databases dynamically."
    type: boolean
    default: true
    show_if: "tursoServer.enabled=true"
    group: "Turso Server"

  - variable: tursoServer.maxNamespaces
    label: "Max concurrent namespaces"
    description: "Hard cap on the number of tursodb subprocesses. 0 disables the limit. Each namespace consumes ~30 MB RAM."
    type: int
    default: 256
    min: 0
    max: 10000
    show_if: "tursoServer.enabled=true"
    group: "Turso Server"

  - variable: tursoServer.autoIdleDuration
    label: "Auto-created namespace idle TTL"
    description: "Auto-created namespaces with no traffic for longer than this are archived by the GC. Go duration string (e.g. 168h = 7d)."
    type: string
    default: "168h"
    show_if: "tursoServer.enabled=true"
    group: "Turso Server"

  - variable: tursoServer.persistence.size
    label: "Turso server storage"
    description: "PVC size for /var/lib/turso (all namespaces + archive)."
    type: string
    default: "5Gi"
    show_if: "tursoServer.enabled=true"
    group: "Turso Server"

  - variable: tursoServer.persistence.storageClass
    label: "Turso storage class"
    description: "StorageClass for the Turso PVC. Leave empty for cluster default."
    type: storageclass
    default: ""
    show_if: "tursoServer.enabled=true"
    group: "Turso Server"

  - variable: tursoServer.image.repository
    label: "Turso server image repository"
    description: "Docker image repository for the turso-server supervisor."
    type: string
    default: "ghcr.io/djalmajr/turso-server"
    show_if: "tursoServer.enabled=true"
    group: "Turso Server"

  - variable: tursoServer.image.tag
    label: "Turso server image tag"
    description: "Docker image tag (pin a specific version in production; avoid 'latest')."
    type: string
    default: "0.1.0"
    show_if: "tursoServer.enabled=true"
    group: "Turso Server"

  - variable: tursoServer.image.pullPolicy
    label: "Turso server image pull policy"
    description: "When to pull the turso-server image."
    type: enum
    default: "IfNotPresent"
    options:
      - "IfNotPresent"
      - "Always"
      - "Never"
    show_if: "tursoServer.enabled=true"
    group: "Turso Server"

  - variable: tursoServer.service.dataPort
    label: "Turso data port"
    description: "Namespace-aware reverse proxy port. Clients connect to libsql://<release>-turso:<port>/<namespace>."
    type: int
    default: 8080
    min: 1
    max: 65535
    show_if: "tursoServer.enabled=true"
    group: "Turso Server"

  - variable: tursoServer.service.adminPort
    label: "Turso admin port"
    description: "REST API port for namespace lifecycle (create/delete/list/lock/ttl). Restricted to control plane via NetworkPolicy."
    type: int
    default: 8081
    min: 1
    max: 65535
    show_if: "tursoServer.enabled=true"
    group: "Turso Server"

  - variable: tursoServer.resources.requests.cpu
    label: "Turso CPU request"
    description: "CPU resource request for the turso-server pod (e.g., 200m)."
    type: string
    default: "200m"
    show_if: "tursoServer.enabled=true"
    group: "Turso Server"

  - variable: tursoServer.resources.requests.memory
    label: "Turso memory request"
    description: "Memory resource request for the turso-server pod (e.g., 512Mi). Each namespace consumes ~30 MB."
    type: string
    default: "512Mi"
    show_if: "tursoServer.enabled=true"
    group: "Turso Server"

  - variable: tursoServer.resources.limits.cpu
    label: "Turso CPU limit"
    description: "CPU resource limit for the turso-server pod."
    type: string
    default: "2"
    show_if: "tursoServer.enabled=true"
    group: "Turso Server"

  - variable: tursoServer.resources.limits.memory
    label: "Turso memory limit"
    description: "Memory resource limit for the turso-server pod."
    type: string
    default: "2Gi"
    show_if: "tursoServer.enabled=true"
    group: "Turso Server"

  - variable: tursoServer.archiveRetention
    label: "Archived namespace retention"
    description: "Archived (auto-idled) databases are permanently removed after this. Go duration string (e.g. 720h = 30d)."
    type: string
    default: "720h"
    show_if: "tursoServer.enabled=true"
    group: "Turso Server"

  - variable: tursoServer.gcInterval
    label: "GC interval"
    description: "How often the garbage collector scans for idle/archived namespaces. Go duration string."
    type: string
    default: "1h"
    show_if: "tursoServer.enabled=true"
    group: "Turso Server"

  # ==================== TURSO BACKUP ====================
  - variable: tursoServer.backup.enabled
    label: "Periodic snapshot backup to S3"
    description: "CronJob that hot-snapshots every namespace via VACUUM INTO and uploads to S3-compatible storage. Recommended disaster-recovery path (replaces Litestream)."
    type: boolean
    default: false
    show_if: "tursoServer.enabled=true"
    group: "Turso Backup"

  - variable: tursoServer.backup.schedule
    label: "Backup schedule (cron)"
    description: "Standard cron expression. Default: daily at 02:00 UTC."
    type: string
    default: "0 2 * * *"
    show_if: "tursoServer.backup.enabled=true"
    group: "Turso Backup"

  - variable: tursoServer.backup.retentionCount
    label: "Backups to retain per namespace"
    description: "How many snapshots to keep per namespace in the bucket. Older snapshots are deleted after each run."
    type: int
    default: 14
    min: 1
    max: 365
    show_if: "tursoServer.backup.enabled=true"
    group: "Turso Backup"

  - variable: tursoServer.backup.image.repository
    label: "Backup image repository"
    description: "Slim image bundling sh + curl + jq + mc. Built from apps/turso-server/backup.Dockerfile."
    type: string
    default: "ghcr.io/djalmajr/turso-backup"
    show_if: "tursoServer.backup.enabled=true"
    group: "Turso Backup"

  - variable: tursoServer.backup.image.tag
    label: "Backup image tag"
    description: "Tag of the backup image."
    type: string
    default: "0.1.0"
    show_if: "tursoServer.backup.enabled=true"
    group: "Turso Backup"

  - variable: tursoServer.backup.image.pullPolicy
    label: "Backup image pull policy"
    description: "When to pull the backup image."
    type: enum
    default: "IfNotPresent"
    options:
      - "IfNotPresent"
      - "Always"
      - "Never"
    show_if: "tursoServer.backup.enabled=true"
    group: "Turso Backup"

  - variable: tursoServer.backup.s3.endpoint
    label: "S3 endpoint"
    description: "S3-compatible endpoint URL (e.g., http://minio.minio.svc.cluster.local:9000)."
    type: string
    default: ""
    show_if: "tursoServer.backup.enabled=true"
    group: "Turso Backup"

  - variable: tursoServer.backup.s3.bucket
    label: "S3 bucket"
    description: "Bucket name for backups (must exist; chart does not create it)."
    type: string
    default: ""
    show_if: "tursoServer.backup.enabled=true"
    group: "Turso Backup"

  - variable: tursoServer.backup.s3.region
    label: "S3 region"
    description: "S3 region. Ignored by most MinIO setups but required by the AWS SDK."
    type: string
    default: "us-east-1"
    show_if: "tursoServer.backup.enabled=true"
    group: "Turso Backup"

  - variable: tursoServer.backup.s3.accessKeyId
    label: "S3 access key ID"
    description: "MinIO/S3 access key. Stored as a Kubernetes Secret."
    type: password
    default: ""
    show_if: "tursoServer.backup.enabled=true"
    group: "Turso Backup"

  - variable: tursoServer.backup.s3.secretAccessKey
    label: "S3 secret access key"
    description: "MinIO/S3 secret. Stored as a Kubernetes Secret."
    type: password
    default: ""
    show_if: "tursoServer.backup.enabled=true"
    group: "Turso Backup"

  - variable: tursoServer.backup.s3.pathStyle
    label: "Use path-style S3 URLs"
    description: "Enable for MinIO (uses path-style by default). Disable for AWS S3 (virtual-hosted style)."
    type: boolean
    default: true
    show_if: "tursoServer.backup.enabled=true"
    group: "Turso Backup"

  # ==================== LITESTREAM (DEPRECATED) ====================
  - variable: tursoServer.litestream.enabled
    label: "Continuous backup to S3 (Litestream)"
    description: "DEPRECATED — use Turso Backup instead. Litestream cannot coexist with `tursodb --sync-server` (file-lock contention) and fails silently. Kept as a switch for legacy experiments; see wiki/ops/turso-server.md#disaster-recovery."
    type: boolean
    default: false
    show_if: "tursoServer.enabled=true"
    group: "Turso Server"

  - variable: tursoServer.litestream.s3.endpoint
    label: "Litestream S3 endpoint"
    description: "DEPRECATED — use Turso Backup. S3-compatible endpoint URL."
    type: string
    default: ""
    show_if: "tursoServer.litestream.enabled=true"
    group: "Turso Server"

  - variable: tursoServer.litestream.s3.bucket
    label: "Litestream S3 bucket"
    description: "DEPRECATED — use Turso Backup. Bucket name (must exist; chart does not create it)."
    type: string
    default: "turso-backups"
    show_if: "tursoServer.litestream.enabled=true"
    group: "Turso Server"

  - variable: tursoServer.litestream.s3.accessKeyId
    label: "Litestream S3 access key ID"
    description: "DEPRECATED — use Turso Backup. MinIO/S3 access key. Stored as a Kubernetes Secret."
    type: password
    default: ""
    show_if: "tursoServer.litestream.enabled=true"
    group: "Turso Server"

  - variable: tursoServer.litestream.s3.secretAccessKey
    label: "Litestream S3 secret access key"
    description: "DEPRECATED — use Turso Backup. MinIO/S3 secret. Stored as a Kubernetes Secret."
    type: password
    default: ""
    show_if: "tursoServer.litestream.enabled=true"
    group: "Turso Server"

  # ==================== PERSISTENCE ====================
  - variable: persistence.state.size
    label: "Per-pod state PVC size"
    description: "Volume for /data/state (api-keys.db). RWO via volumeClaimTemplates."
    type: string
    default: "500Mi"
    group: "Persistence"

  # NOTE: no "Image Tag" question on purpose. The image tag defaults to the
  # chart version (.Chart.Version) — see statefulset.yaml + values.tag: "".
  # Exposing a separate tag field let it drift/pin (e.g. an upgrade bumped the
  # chart to 0.5.0 while the saved tag stayed 0.4.4, serving the old image).
  # To pin a specific build, set image.tag via "Customize Helm options".

  # ==================== INGRESS ====================
  - variable: ingress.host
    label: "Ingress Hostname"
    description: "Hostname only, no protocol/path (e.g., buntime.example.com or *.example.com). Leave empty to disable."
    type: hostname
    default: ""
    group: "Runtime"

  - variable: ingress.className
    label: "Ingress Class"
    description: "Ingress controller class name"
    type: string
    default: "traefik"
    group: "Runtime"

  - variable: ingress.maxBodySize
    label: "Max Upload Size"
    description: "Maximum request body size for nginx (e.g., 100m, 0 for unlimited)"
    type: string
    default: "100m"
    group: "Runtime"

  - variable: ingress.tls.enabled
    label: "Enable TLS"
    description: "Enable HTTPS with TLS certificate"
    type: boolean
    default: false
    group: "Runtime"

  # ==================== RESOURCES ====================
  - variable: resources.requests.cpu
    label: "CPU Request"
    description: "CPU requested by each runtime pod"
    type: string
    default: "250m"
    group: "Resources"

  - variable: resources.requests.memory
    label: "Memory Request"
    description: "Memory requested by each runtime pod"
    type: string
    default: "256Mi"
    group: "Resources"

  - variable: resources.limits.cpu
    label: "CPU Limit"
    description: "CPU limit for each runtime pod"
    type: string
    default: "2"
    group: "Resources"

  - variable: resources.limits.memory
    label: "Memory Limit"
    description: "Memory limit for each runtime pod"
    type: string
    default: "1Gi"
    group: "Resources"

  # ==================== STORAGE ====================
  - variable: persistence.plugins.size
    label: "Plugins Volume Size"
    description: "Size of persistent volume for custom plugins"
    type: string
    default: "5Gi"
    group: "Runtime"

  - variable: persistence.plugins.accessMode
    label: "Plugins Access Mode"
    description: "PVC access mode (ReadWriteMany recommended for rolling updates and scaling)"
    type: enum
    default: "ReadWriteMany"
    options:
      - "ReadWriteOnce"
      - "ReadWriteMany"
    group: "Runtime"

  - variable: persistence.plugins.storageClass
    label: "Plugins Storage Class"
    description: "Storage class for plugins volume (leave empty for default)"
    type: storageclass
    default: ""
    group: "Runtime"

  - variable: persistence.apps.size
    label: "Apps Volume Size"
    description: "Size of persistent volume for user applications"
    type: string
    default: "10Gi"
    group: "Runtime"

  - variable: persistence.apps.accessMode
    label: "Apps Access Mode"
    description: "PVC access mode (ReadWriteMany recommended for rolling updates and scaling)"
    type: enum
    default: "ReadWriteMany"
    options:
      - "ReadWriteOnce"
      - "ReadWriteMany"
    group: "Runtime"

  - variable: persistence.apps.storageClass
    label: "Apps Storage Class"
    description: "Storage class for apps volume (leave empty for default)"
    type: storageclass
    default: ""
    group: "Runtime"

# Plugin questions will be appended below by generate-helm-questions.ts
