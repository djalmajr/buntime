{{- $needsRuntimeSecret := or .Values.buntime.rootKey
                            (or .Values.buntime.authDb.syncAuthToken
                                .Values.tursoServer.enabled) }}
{{- if $needsRuntimeSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "buntime.fullname" . }}
  labels:
    {{- include "buntime.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{- if .Values.buntime.rootKey }}
  RUNTIME_ROOT_KEY: {{ .Values.buntime.rootKey | quote }}
  {{- end }}
  {{- if .Values.tursoServer.enabled }}
  # Data-plane token used by ApiKeyStore (sync replicas) and plugin-turso to
  # authenticate against the turso-server data port. The matching value lives
  # on the turso-server Secret (see turso-server.yaml).
  {{- if .Values.tursoServer.authToken }}
  RUNTIME_AUTH_DB_SYNC_TOKEN: {{ .Values.tursoServer.authToken | quote }}
  TURSO_SERVER_TOKEN: {{ .Values.tursoServer.authToken | quote }}
  {{- end }}
  # Admin-plane token used by the runtime control plane to call the
  # turso-server admin API (namespace lifecycle). Workers do NOT receive it.
  {{- if .Values.tursoServer.adminToken }}
  TURSO_SERVER_ADMIN_TOKEN: {{ .Values.tursoServer.adminToken | quote }}
  {{- end }}
  {{- else if .Values.buntime.authDb.syncAuthToken }}
  RUNTIME_AUTH_DB_SYNC_TOKEN: {{ .Values.buntime.authDb.syncAuthToken | quote }}
  {{- end }}
{{- end }}
{{- if and .Values.tursoServer.enabled .Values.tursoServer.backup.enabled }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "buntime.fullname" . }}-backup
  labels:
    {{- include "buntime.labels" . | nindent 4 }}
    app.kubernetes.io/component: turso-backup
type: Opaque
stringData:
  AWS_ACCESS_KEY_ID:     {{ .Values.tursoServer.backup.s3.accessKeyId | quote }}
  AWS_SECRET_ACCESS_KEY: {{ .Values.tursoServer.backup.s3.secretAccessKey | quote }}
{{- end }}
{{- if and .Values.tursoServer.enabled .Values.tursoServer.litestream.enabled }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "buntime.fullname" . }}-litestream
  labels:
    {{- include "buntime.labels" . | nindent 4 }}
    app.kubernetes.io/component: turso-server
type: Opaque
stringData:
  AWS_ACCESS_KEY_ID:     {{ .Values.tursoServer.litestream.s3.accessKeyId | quote }}
  AWS_SECRET_ACCESS_KEY: {{ .Values.tursoServer.litestream.s3.secretAccessKey | quote }}
{{- end }}
