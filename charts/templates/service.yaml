apiVersion: v1
kind: Service
metadata:
  name: {{ include "buntime.fullname" . }}
  labels:
    {{- include "buntime.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "buntime.selectorLabels" . | nindent 4 }}
---
# Headless Service required by the StatefulSet for stable per-pod DNS.
# Pods can be reached at `<release>-N.<release>-headless.<ns>.svc.cluster.local`.
apiVersion: v1
kind: Service
metadata:
  name: {{ include "buntime.fullname" . }}-headless
  labels:
    {{- include "buntime.labels" . | nindent 4 }}
spec:
  clusterIP: None
  ports:
    - port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "buntime.selectorLabels" . | nindent 4 }}
