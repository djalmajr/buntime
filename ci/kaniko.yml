# Kaniko image build for the buntime fork (gitlab.djalmajr.dev/zommehq/buntime).
#
# The cluster's GitLab runner is `privileged = false`, so the public repo's
# docker-dind `.gitlab-ci.yml` cannot run here. Kaniko builds without a Docker
# daemon and works under an unprivileged runner.
#
# Wire it on the fork project (Settings → CI/CD → General pipelines → CI/CD
# configuration file = `ci/kaniko.yml`). The public repo (github.com/zommehq/buntime)
# keeps using its generic `.gitlab-ci.yml`; this file is only the fork's CI.
#
# GitLab injects the registry creds ($CI_REGISTRY*, the project's own
# registry.djalmajr.dev/zommehq/buntime) and checks out the source — no manual
# git/registry secrets needed. Internal registry is selfsigned → skip TLS verify.

stages:
  - image

image:build:
  stage: image
  image:
    name: gcr.io/kaniko-project/executor:debug
    entrypoint: [""]
  tags:
    - k8s
  script:
    - mkdir -p /kaniko/.docker
    - |
      cat > /kaniko/.docker/config.json <<EOF
      { "auths": { "${CI_REGISTRY}": { "username": "${CI_REGISTRY_USER}", "password": "${CI_REGISTRY_PASSWORD}" } } }
      EOF
    - >-
      /kaniko/executor
      --context "${CI_PROJECT_DIR}"
      --dockerfile "${CI_PROJECT_DIR}/Dockerfile"
      --destination "${CI_REGISTRY_IMAGE}:${CI_COMMIT_SHORT_SHA}"
      --destination "${CI_REGISTRY_IMAGE}:${CI_COMMIT_REF_SLUG}"
      --skip-tls-verify-registry "${CI_REGISTRY}"
  rules:
    - if: "$CI_COMMIT_BRANCH"
    - if: "$CI_COMMIT_TAG"
