# Buntime overlay for the home-workload cluster (3-node k3s @ CLUSTER_IP).
#
# Usage:
#   helm upgrade --install buntime ./charts \
#     --namespace buntime \
#     -f charts/values.yaml \
#     -f charts/values.home-workload.yaml \
#     --wait --timeout 5m
#
# Prerequisites (run once):
#   kubectl create namespace buntime
#   kubectl -n buntime create secret docker-registry gitlab-home \
#     --docker-server=registry.example.com \
#     --docker-username=<user> \
#     --docker-password=<gitlab PAT>
#   # Optional: kubectl -n buntime create secret generic turso-backup-s3 \
#   #   --from-literal=accessKeyId=<minio-key> \
#   #   --from-literal=secretAccessKey=<minio-secret>
#
# Sync mode + multi-pod via the in-cluster turso-server. Daily snapshot
# backup to the MinIO bucket from task #74.

replicaCount: 2

image:
  repository: ghcr.io/zommehq/buntime
  tag: "0.3.0"
  pullPolicy: IfNotPresent

imagePullSecrets:
  - name: gitlab-home

# Sync mode: pods read/write ApiKeyStore via the in-cluster turso-server.
# RUNTIME_AUTH_DB_SYNC_URL is auto-populated by the chart since
# tursoServer.enabled=true below.
buntime:
  authDb:
    mode: sync
    syncIntervalSeconds: 60
  # rootKey is supplied via secret `buntime-root-key`; do NOT put it in plaintext here.
  # The chart references it via env.RUNTIME_ROOT_KEY -> Secret key when populated.

# Shared workerDirs/pluginDirs across replicas: RWX.
persistence:
  plugins:
    size: 5Gi
    accessMode: ReadWriteMany
    storageClass: longhorn
  apps:
    size: 10Gi
    accessMode: ReadWriteMany
    storageClass: longhorn
  state:
    size: 500Mi
    storageClass: longhorn

# Ingress via Traefik (k3s default).
ingress:
  host: buntime.home
  className: traefik
  path: /
  maxBodySize: 100m
  tls:
    enabled: false  # Lab cluster — HTTP only. Enable + cert-manager later.

# Multi-tenant Turso supervisor — sync target for ApiKeyStore + every
# storage-backed plugin (turso, proxy, gateway).
tursoServer:
  enabled: true
  image:
    repository: ghcr.io/zommehq/turso-server
    tag: "0.1.0"
    pullPolicy: IfNotPresent
  service:
    dataPort: 8080
    adminPort: 8081
  resources:
    requests:
      cpu: 200m
      memory: 512Mi
    limits:
      cpu: "2"
      memory: 2Gi
  persistence:
    size: 5Gi
    storageClass: longhorn
  # authToken + adminToken stored in plaintext here are NOT secret enough
  # for production — override per-environment via --set or sealed-secrets.
  # For the lab they're generated by k8s-prep.sh and substituted in.
  authToken: ""
  adminToken: ""
  autoProvision: true
  maxNamespaces: 256
  autoIdleDuration: "168h"
  archiveRetention: "720h"
  gcInterval: "1h"

  backup:
    # DISABLED for v0.3.0 lab deploy — MinIO not yet provisioned on home
    # cluster. To enable: run infra/scripts/install-lab-services.sh (MinIO
    # section) + create bucket `buntime-turso-backups` + flip enabled=true
    # and populate s3 credentials via Secret. Tracked as v0.3.1 follow-up.
    enabled: false

  litestream:
    enabled: false  # DEPRECATED — confirmed broken with tursodb --sync-server.
