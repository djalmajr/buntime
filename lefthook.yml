# Lefthook configuration
# https://github.com/evilmartians/lefthook

pre-commit:
  commands:
    version-sync:
      glob: "{package.json,apps/runtime/package.json,charts/Chart.yaml}"
      run: bun scripts/check-version-sync.ts
      fail_text: "Version mismatch! Run 'bun scripts/bump-version.ts --chart=<bump> [--app=<bump>]' to sync."

    jsr-version-sync:
      glob: "packages/shared/{package.json,jsr.json}"
      run: bun scripts/check-jsr-version-sync.ts
      fail_text: "packages/shared version mismatch between package.json and jsr.json!"

    chart-version:
      glob: "charts/**"
      run: bun scripts/check-chart-version.ts
      fail_text: "Chart files changed without version bump! Run 'bun scripts/bump-version.ts --chart=patch' to fix."

    # Secrets scan — catches .env / API keys / private keys in the staged diff.
    # Soft-skips if gitleaks is not installed ('brew install gitleaks' on macOS).
    secrets-scan:
      run: |
        if ! command -v gitleaks > /dev/null 2>&1; then
          echo "gitleaks not installed - 'brew install gitleaks' for local secret scanning. CI covers it."
          exit 0
        fi
        gitleaks protect --staged --redact --no-banner
      fail_text: "gitleaks found a secret in the staged diff. Remove it before committing."
