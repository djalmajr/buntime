name: "@buntime/plugin-metrics"
base: "/metrics"
enabled: false
injectBase: true

entrypoint: dist/client/index.html
pluginEntry: dist/plugin.js

menus:
  - icon: lucide:activity
    path: /metrics
    title: Metrics
    items:
      - icon: lucide:layout-dashboard
        path: /metrics
        title: Overview
      - icon: lucide:cpu
        path: /metrics/workers
        title: Workers

# Admin routes auth via the runtime credential channels (X-API-Key, Bearer,
# or the cpanel session cookie) — handled in `app.ts` before any plugin hook
# fires, so they need no `publicRoutes` entry.
# Prometheus scrape stays open by convention — secure via network boundary.
publicRoutes:
  GET:
    - /prometheus

# Enable Prometheus format endpoint
prometheus: true

# SSE update interval in milliseconds
sseInterval: 1000
